<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrderSystem PRO | Sistema de Pedidos</title>
    <!-- Tailwind CSS para Estilização -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Bibliotecas Core: React, Babel (para JSX), e Firebase -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Geração de PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <!-- Scripts do Firebase (ES Modules via CDN) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.FirebaseCore = { initializeApp };
        window.FirebaseAuth = { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken };
        window.FirebaseStore = { getFirestore, doc, setDoc, onSnapshot };
    </script>

    <!-- Código da Aplicação React -->
    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;
        const { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } = window.FirebaseAuth;
        const { getFirestore, doc, setDoc, onSnapshot } = window.FirebaseStore;
        const { initializeApp } = window.FirebaseCore;

        // --- Ícones Inline SVG corrigidos com Fragmentos React ---
        const Icon = ({ name, className = "w-5 h-5" }) => {
            const icons = {
                plus: <path d="M12 5v14M5 12h14" />,
                trash: <><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6" /></>,
                copy: <><rect width="14" height="14" x="8" y="8" rx="2" ry="2" /><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" /></>,
                download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" /></>,
                package: <><path d="M16.5 9.4 7.55 4.24M21 16V8a2 2 0 0 0-1-1.73L13 2.27a2 2 0 0 0-2 0L4 6.27A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z" /><polyline points="3.29 7 l8.71 5 8.71 -5" /><line x1="12" y1="22" x2="12" y2="12" /></>,
                users: <><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M22 21v-2a4 4 0 0 0-3-3.87" /><path d="M18 7a4 4 0 0 0-3-3.87" /></>,
                save: <><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" /><polyline points="17 21 17 13 7 13 7 21" /><polyline points="7 3 7 8 15 8" /></>,
                search: <><circle cx="11" cy="11" r="8" /><path d="m21 21-4.3-4.3" /></>,
                phone: <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />,
                calc: <><rect width="16" height="20" x="4" y="2" rx="2" /><line x1="8" y1="6" x2="16" y2="6" /><line x1="16" y1="14" x2="16" y2="18" /><path d="M16 10h.01" /><path d="M12 10h.01" /><path d="M8 10h.01" /><path d="M12 14h.01" /><path d="M8 14h.01" /><path d="M12 18h.01" /><path d="M8 18h.01" /></>
            };
            return (
                <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    {icons[name]}
                </svg>
            );
        };

        // --- Inicialização do Firebase ---
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'order-system-pro';

        const InputMasked = ({ label, value, onChange, placeholder, maskType, icon, className = "" }) => {
            const applyMask = (val) => {
                if (!val) return "";
                let clean = val.replace(/\D/g, "");
                if (maskType === 'phone') {
                    clean = clean.substring(0, 11);
                    return clean.length > 10 ? `(${clean.slice(0, 2)}) ${clean.slice(2, 7)}-${clean.slice(7)}` : clean.length > 2 ? `(${clean.slice(0, 2)}) ${clean.slice(2)}` : clean;
                }
                if (maskType === 'cnpj') {
                    clean = clean.substring(0, 14);
                    return clean.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, "$1.$2.$3/$4-$5");
                }
                if (maskType === 'cep') {
                    clean = clean.substring(0, 8);
                    return clean.length > 5 ? `${clean.slice(0, 5)}-${clean.slice(5)}` : clean;
                }
                return val;
            };

            return (
                <div className={`flex flex-col gap-1 ${className}`}>
                    <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">{label}</label>
                    <div className="relative">
                        {icon && <div className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"><Icon name={icon} className="w-4 h-4" /></div>}
                        <input
                            type="text"
                            value={applyMask(value)}
                            onChange={(e) => onChange(e.target.value.replace(/\D/g, ""))}
                            placeholder={placeholder}
                            className={`w-full ${icon ? 'pl-10' : 'px-4'} py-2 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all outline-none text-slate-700 shadow-sm text-sm`}
                        />
                    </div>
                </div>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [saving, setSaving] = useState(false);
            const [notification, setNotification] = useState(null);
            
            const [cliente, setCliente] = useState({ nome: '', telefone: '', cnpj: '', cep: '', endereco: '', bairro: '', cidade: '', estado: '', logo: '' });
            const [modelos, setModelos] = useState([]);
            const [config, setConfig] = useState({ desconto: 0, frete: 0, gradePadrao: { '34': 0, '35': 0, '36': 0, '37': 0, '38': 0, '39': 0, '40': 0 } });

            // Autenticação
            useEffect(() => {
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                initAuth();
                return onAuthStateChanged(auth, (u) => { setUser(u); setLoading(false); });
            }, []);

            // Sincronização de Dados
            useEffect(() => {
                if (!user) return;
                const unsub = onSnapshot(doc(db, 'artifacts', appId, 'users', user.uid, 'currentOrder', 'main'), (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        setCliente(prev => ({...prev, ...data.cliente}));
                        setModelos(data.modelos || []);
                        setConfig(prev => ({...prev, ...data.config}));
                    }
                }, (err) => console.error("Erro no Firestore:", err));
                return unsub;
            }, [user]);

            const handleSave = async (c = cliente, m = modelos, conf = config) => {
                if (!user) return;
                setSaving(true);
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'currentOrder', 'main'), { 
                        cliente: c, 
                        modelos: m, 
                        config: conf, 
                        lastUpdated: new Date().toISOString() 
                    });
                    showNotification("Progresso guardado!");
                } catch (e) { showNotification("Erro ao guardar dados", "error"); }
                setSaving(false);
            };

            const showNotification = (msg, type = "success") => {
                setNotification({ msg, type });
                setTimeout(() => setNotification(null), 3000);
            };

            const buscarCep = async () => {
                if (cliente.cep.length !== 8) return;
                try {
                    const res = await fetch(`https://viacep.com.br/ws/${cliente.cep}/json/`);
                    const data = await res.json();
                    if (!data.erro) {
                        const newCliente = { ...cliente, endereco: data.logradouro, bairro: data.bairro, cidade: data.localidade, estado: data.uf };
                        setCliente(newCliente);
                        handleSave(newCliente);
                    }
                } catch (e) { showNotification("Erro ao buscar CEP", "error"); }
            };

            const addModelo = (img = null) => {
                const newModel = { id: Math.random().toString(36).substr(2, 9), foto: img || 'https://placehold.co/300x300/e2e8f0/6366f1?text=Novo+Modelo', cores: '', valorUnitario: 0, grade: { ...config.gradePadrao } };
                const updated = [...modelos, newModel];
                setModelos(updated);
                handleSave(cliente, updated);
            };

            const updateGrade = (mid, size, val) => {
                const updated = modelos.map(m => m.id === mid ? { ...m, grade: { ...m.grade, [size]: parseInt(val) || 0 } } : m);
                setModelos(updated);
                handleSave(cliente, updated);
            };

            const stats = modelos.reduce((acc, m) => {
                const paresCor = Object.values(m.grade).reduce((a, b) => a + b, 0);
                const nCores = m.cores.split(',').filter(c => c.trim()).length || 1;
                const totalPares = paresCor * nCores;
                acc.pares += totalPares;
                acc.valor += totalPares * (m.valorUnitario || 0);
                return acc;
            }, { pares: 0, valor: 0 });

            const valorFinal = stats.valor + parseFloat(config.frete || 0) - parseFloat(config.desconto || 0);

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center gap-4 bg-white">
                    <div className="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                    <span className="font-bold text-slate-400 text-xs tracking-widest uppercase">A preparar OrderSystem...</span>
                </div>
            );

            return (
                <div className="min-h-screen pb-20">
                    {/* Dashboard Superior */}
                    <header className="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
                        <div className="max-w-7xl mx-auto px-4 py-3 flex flex-wrap justify-between items-center gap-4">
                            <div className="flex items-center gap-3">
                                <div className="bg-indigo-600 p-2 rounded-xl text-white shadow-lg shadow-indigo-100"><Icon name="package" /></div>
                                <div>
                                    <h1 className="text-lg font-black tracking-tighter">OrderSystem <span className="text-indigo-600">PRO</span></h1>
                                    <div className="flex items-center gap-1.5">
                                        <div className={`w-1.5 h-1.5 rounded-full ${saving ? 'bg-amber-400 animate-pulse' : 'bg-green-500'}`}></div>
                                        <span className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">{saving ? 'A Guardar...' : 'Nuvem Ativa'}</span>
                                    </div>
                                </div>
                            </div>
                            <div className="flex items-center gap-6">
                                <div className="text-right">
                                    <p className="text-[9px] font-bold text-slate-400 uppercase">Pares Totais</p>
                                    <p className="text-xl font-black text-indigo-600">{stats.pares}</p>
                                </div>
                                <div className="text-right border-l pl-6 border-slate-200">
                                    <p className="text-[9px] font-bold text-slate-400 uppercase">Subtotal</p>
                                    <p className="text-xl font-black">R$ {valorFinal.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</p>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Conteúdo Principal */}
                    <main className="max-w-7xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
                        {/* Sidebar de Configurações */}
                        <aside className="lg:col-span-4 space-y-6">
                            <section className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm space-y-4">
                                <div className="flex items-center gap-2 mb-2"><Icon name="users" className="text-indigo-600 w-4 h-4" /><h2 className="font-bold text-sm uppercase">Dados da Cliente</h2></div>
                                
                                <div className="flex items-center gap-4 py-2 border-b border-slate-50 mb-2">
                                    <div className="w-16 h-16 bg-slate-50 rounded-2xl border-2 border-dashed border-slate-200 flex items-center justify-center relative overflow-hidden group">
                                        {cliente.logo ? <img src={cliente.logo} className="w-full h-full object-contain" /> : <Icon name="plus" className="text-slate-300" />}
                                        <input type="file" className="absolute inset-0 opacity-0 cursor-pointer" onChange={e => {
                                            const reader = new FileReader();
                                            reader.onload = ev => { setCliente({...cliente, logo: ev.target.result}); handleSave({...cliente, logo: ev.target.result}); };
                                            if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
                                        }} />
                                    </div>
                                    <p className="text-[10px] text-slate-400 leading-tight">Carregue a logomarca para personalizar os documentos.</p>
                                </div>

                                <InputMasked label="Nome Completo" value={cliente.nome} onChange={v => setCliente({...cliente, nome: v})} placeholder="Ex: Boutique da Maria" />
                                <div className="grid grid-cols-2 gap-3">
                                    <InputMasked label="WhatsApp" value={cliente.telefone} maskType="phone" onChange={v => setCliente({...cliente, telefone: v})} icon="phone" />
                                    <InputMasked label="CNPJ (Opcional)" value={cliente.cnpj} maskType="cnpj" onChange={v => setCliente({...cliente, cnpj: v})} />
                                </div>
                                <div className="flex items-end gap-2">
                                    <InputMasked label="CEP" value={cliente.cep} maskType="cep" onChange={v => setCliente({...cliente, cep: v})} className="flex-1" />
                                    <button onClick={buscarCep} className="p-2.5 bg-slate-100 rounded-xl hover:bg-indigo-50 hover:text-indigo-600 transition-colors"><Icon name="search" /></button>
                                </div>
                                <InputMasked label="Endereço" value={cliente.endereco} onChange={v => setCliente({...cliente, endereco: v})} />
                                <div className="grid grid-cols-2 gap-3">
                                    <InputMasked label="Cidade" value={cliente.cidade} onChange={v => setCliente({...cliente, cidade: v})} />
                                    <InputMasked label="Estado" value={cliente.estado} onChange={v => setCliente({...cliente, estado: v})} />
                                </div>
                            </section>

                            <section className="bg-slate-900 p-6 rounded-3xl text-white shadow-xl space-y-4">
                                <div className="flex items-center gap-2 border-b border-slate-800 pb-3"><Icon name="calc" className="text-indigo-400" /><h2 className="font-bold">Finanças</h2></div>
                                <div className="space-y-3">
                                    <div className="flex justify-between text-xs text-slate-400"><span>Produtos</span><span>R$ {stats.valor.toLocaleString('pt-BR')}</span></div>
                                    <div className="flex flex-col gap-1">
                                        <label className="text-[9px] font-bold text-indigo-400 uppercase">Frete (+)</label>
                                        <input type="number" value={config.frete} onChange={e => { const updated = {...config, frete: e.target.value}; setConfig(updated); handleSave(cliente, modelos, updated); }} className="bg-slate-800 border-none rounded-xl p-2 text-sm outline-none focus:ring-1 focus:ring-indigo-500" />
                                    </div>
                                    <div className="flex flex-col gap-1">
                                        <label className="text-[9px] font-bold text-rose-400 uppercase">Desconto (-)</label>
                                        <input type="number" value={config.desconto} onChange={e => { const updated = {...config, desconto: e.target.value}; setConfig(updated); handleSave(cliente, modelos, updated); }} className="bg-slate-800 border-none rounded-xl p-2 text-sm outline-none focus:ring-1 focus:ring-rose-500" />
                                    </div>
                                    <div className="pt-4 border-t border-slate-800 flex justify-between items-center">
                                        <span className="font-bold text-sm">TOTAL</span>
                                        <span className="text-2xl font-black text-indigo-400">R$ {valorFinal.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</span>
                                    </div>
                                </div>
                            </section>
                        </aside>

                        {/* Lista de Modelos */}
                        <div className="lg:col-span-8 space-y-6">
                            <div className="flex justify-between items-center bg-white p-6 rounded-3xl border border-slate-200">
                                <div>
                                    <h2 className="text-xl font-black">Produtos do Pedido</h2>
                                    <p className="text-xs text-slate-400 font-bold uppercase tracking-widest">Controle de Produção</p>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => addModelo()} className="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-3 rounded-2xl font-bold transition-all shadow-lg active:scale-95 text-sm">
                                        <Icon name="plus" /> Novo Modelo
                                    </button>
                                    <label className="flex items-center gap-2 bg-slate-800 hover:bg-slate-900 text-white px-5 py-3 rounded-2xl font-bold transition-all cursor-pointer text-sm">
                                        <Icon name="copy" /> Lote
                                        <input type="file" multiple className="hidden" onChange={e => {
                                            const files = Array.from(e.target.files);
                                            files.forEach(f => { const r = new FileReader(); r.onload = ev => addModelo(ev.target.result); r.readAsDataURL(f); });
                                        }} />
                                    </label>
                                </div>
                            </div>

                            <div className="space-y-4">
                                {modelos.length === 0 ? (
                                    <div className="bg-slate-100/50 border-2 border-dashed border-slate-200 rounded-[2.5rem] py-20 flex flex-col items-center gap-3">
                                        <Icon name="package" className="w-12 h-12 text-slate-300" />
                                        <p className="text-slate-400 font-bold uppercase text-[10px] tracking-[0.2em]">Adicione o primeiro modelo para começar</p>
                                    </div>
                                ) : (
                                    modelos.map((m, idx) => {
                                        const pCor = Object.values(m.grade).reduce((a, b) => a + b, 0);
                                        const nC = m.cores.split(',').filter(c => c.trim()).length || 1;
                                        return (
                                            <div key={m.id} className="bg-white rounded-[2rem] border border-slate-200 overflow-hidden shadow-sm group">
                                                <div className="flex flex-col md:flex-row">
                                                    <div className="w-full md:w-48 h-48 relative bg-slate-100">
                                                        <img src={m.foto} className="w-full h-full object-cover" />
                                                        <div className="absolute top-3 left-3 bg-black/50 backdrop-blur-md text-white text-[9px] font-black px-2 py-1 rounded-lg uppercase">Item #{idx+1}</div>
                                                        <input type="file" className="absolute inset-0 opacity-0 cursor-pointer" onChange={e => {
                                                            const r = new FileReader();
                                                            r.onload = ev => {
                                                                const updated = modelos.map(mod => mod.id === m.id ? {...mod, foto: ev.target.result} : mod);
                                                                setModelos(updated); handleSave(cliente, updated);
                                                            };
                                                            if(e.target.files[0]) r.readAsDataURL(e.target.files[0]);
                                                        }} />
                                                    </div>
                                                    <div className="flex-1 p-6 space-y-4">
                                                        <div className="flex justify-between items-start gap-4">
                                                            <div className="flex-1">
                                                                <label className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Cores (Preto, Nude...)</label>
                                                                <input type="text" value={m.cores} onChange={e => {
                                                                    const updated = modelos.map(mod => mod.id === m.id ? {...mod, cores: e.target.value} : mod);
                                                                    setModelos(updated); handleSave(cliente, updated);
                                                                }} className="w-full border-b border-slate-100 py-1 outline-none focus:border-indigo-500 font-bold text-sm" placeholder="Lista de cores" />
                                                            </div>
                                                            <div className="text-right">
                                                                <label className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Valor Unitário</label>
                                                                <div className="flex items-center gap-1 font-black text-lg">
                                                                    <span className="text-slate-300">R$</span>
                                                                    <input type="number" value={m.valorUnitario} onChange={e => {
                                                                        const updated = modelos.map(mod => mod.id === m.id ? {...mod, valorUnitario: e.target.value} : mod);
                                                                        setModelos(updated); handleSave(cliente, updated);
                                                                    }} className="w-20 text-right outline-none bg-transparent" />
                                                                </div>
                                                            </div>
                                                        </div>

                                                        <div className="grid grid-cols-7 gap-2">
                                                            {Object.keys(m.grade).map(size => (
                                                                <div key={size} className="flex flex-col items-center">
                                                                    <span className="text-[10px] font-bold text-slate-400 mb-1">{size}</span>
                                                                    <input type="number" value={m.grade[size]} onChange={e => updateGrade(m.id, size, e.target.value)} className="w-full text-center py-2 bg-slate-50 rounded-xl border-none outline-none focus:ring-2 focus:ring-indigo-500/20 font-bold text-sm" />
                                                                </div>
                                                            ))}
                                                        </div>

                                                        <div className="flex justify-between items-center pt-4 border-t border-slate-50">
                                                            <div className="flex gap-4">
                                                                <div className="bg-indigo-50 px-3 py-1 rounded-full text-[10px] font-bold text-indigo-600 uppercase tracking-widest">Total: {pCor * nC} pares</div>
                                                                <div className="bg-emerald-50 px-3 py-1 rounded-full text-[10px] font-bold text-emerald-600 uppercase tracking-widest">Subtotal: R$ {(pCor * nC * m.valorUnitario).toLocaleString('pt-BR')}</div>
                                                            </div>
                                                            <div className="flex gap-2">
                                                                <button onClick={() => {
                                                                    const updated = [...modelos, {...m, id: Math.random().toString(36).substr(2,9)}];
                                                                    setModelos(updated); handleSave(cliente, updated);
                                                                }} className="p-2 hover:bg-slate-50 text-slate-300 hover:text-indigo-600 transition-all"><Icon name="copy" className="w-4 h-4" /></button>
                                                                <button onClick={() => {
                                                                    const updated = modelos.filter(mod => mod.id !== m.id);
                                                                    setModelos(updated); handleSave(cliente, updated);
                                                                }} className="p-2 hover:bg-rose-50 text-slate-300 hover:text-rose-600 transition-all"><Icon name="trash" className="w-4 h-4" /></button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })
                                )}
                            </div>
                        </div>
                    </main>

                    {/* Menu Flutuante de Ações PDF */}
                    <div className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-white/80 backdrop-blur-xl border border-slate-200 px-6 py-4 rounded-[2rem] shadow-2xl flex items-center gap-6 z-[100]">
                        <div className="hidden md:block">
                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Documentos</p>
                        </div>
                        <div className="flex gap-3">
                            <button onClick={() => window.print()} className="flex items-center gap-2 bg-slate-800 text-white px-5 py-2.5 rounded-2xl text-xs font-bold hover:bg-black transition-all">
                                <Icon name="download" className="w-4 h-4" /> PDF Cliente
                            </button>
                            <button onClick={() => window.print()} className="flex items-center gap-2 bg-indigo-600 text-white px-5 py-2.5 rounded-2xl text-xs font-bold hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100">
                                <Icon name="package" className="w-4 h-4" /> PDF Produção
                            </button>
                        </div>
                    </div>

                    {/* Toast de Notificação Simples */}
                    {notification && (
                        <div className={`fixed top-6 right-6 z-[110] px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 animate-bounce ${notification.type === 'success' ? 'bg-indigo-600' : 'bg-rose-600'} text-white`}>
                            <Icon name="package" />
                            <span className="font-bold text-sm tracking-tight">{notification.msg}</span>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
