<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrderSystem PRO | Sistema de Pedidos</title>
    <!-- Tailwind CSS para Estilização -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Geração de PDF e Captura de Ecrã -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Animação para o Toast */
        @keyframes slideIn {
            from { transform: translateY(100%) translateX(-50%); opacity: 0; }
            to { transform: translateY(0) translateX(-50%); opacity: 1; }
        }
        .toast-animate { animation: slideIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <!-- Interface Principal -->
    <div id="app-container">
        <!-- Dashboard Superior -->
        <header class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
            <div class="max-w-7xl mx-auto px-4 py-3 flex flex-wrap justify-between items-center gap-4">
                <div class="flex items-center gap-3">
                    <div class="bg-indigo-600 p-2 rounded-xl text-white shadow-lg shadow-indigo-100">
                        <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16.5 9.4 7.55 4.24M21 16V8a2 2 0 0 0-1-1.73L13 2.27a2 2 0 0 0-2 0L4 6.27A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><polyline points="3.29 7l8.71 5 8.71-5"/><line x1="12" y1="22" x2="12" y2="12"/></svg>
                    </div>
                    <div>
                        <h1 class="text-lg font-black tracking-tighter">OrderSystem <span class="text-indigo-600">PRO</span></h1>
                        <div class="flex items-center gap-1.5">
                            <div id="sync-indicator" class="w-1.5 h-1.5 rounded-full bg-green-500"></div>
                            <span id="sync-text" class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Nuvem Ativa</span>
                        </div>
                    </div>
                </div>
                <div class="flex items-center gap-6">
                    <div class="text-right">
                        <p class="text-[9px] font-bold text-slate-400 uppercase">Pares Totais</p>
                        <p id="total-pares-header" class="text-xl font-black text-indigo-600">0</p>
                    </div>
                    <div class="text-right border-l pl-6 border-slate-200">
                        <p class="text-[9px] font-bold text-slate-400 uppercase">Subtotal</p>
                        <p id="subtotal-header" class="text-xl font-black">R$ 0,00</p>
                    </div>
                </div>
            </div>
        </header>

        <!-- Conteúdo Principal -->
        <main class="max-w-7xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Sidebar (Dados da Cliente e Finanças) -->
            <aside class="lg:col-span-4 space-y-6">
                <section class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm space-y-4">
                    <div class="flex items-center gap-2 mb-2">
                        <svg class="w-4 h-4 text-indigo-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M18 7a4 4 0 0 0-3-3.87"/></svg>
                        <h2 class="font-bold text-sm uppercase">Dados da Cliente</h2>
                    </div>
                    
                    <div class="flex items-center gap-4 py-2 border-b border-slate-50 mb-2">
                        <div id="logo-container" class="w-16 h-16 bg-slate-50 rounded-2xl border-2 border-dashed border-slate-200 flex items-center justify-center relative overflow-hidden group">
                            <span id="logo-placeholder" class="text-slate-300">
                                <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                            </span>
                            <img id="logo-img" class="hidden w-full h-full object-contain" />
                            <input type="file" id="input-logo" class="absolute inset-0 opacity-0 cursor-pointer" accept="image/*" />
                        </div>
                        <p class="text-[10px] text-slate-400 leading-tight">Carregue a logomarca para personalizar os documentos.</p>
                    </div>

                    <div class="space-y-3">
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Nome Completo</label>
                            <input type="text" id="cliente-nome" class="w-full px-4 py-2 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 outline-none text-sm" placeholder="Ex: Boutique da Maria" />
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">WhatsApp</label>
                                <input type="text" id="cliente-telefone" class="w-full px-4 py-2 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 outline-none text-sm" placeholder="(00) 00000-0000" />
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">CNPJ</label>
                                <input type="text" id="cliente-cnpj" class="w-full px-4 py-2 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 outline-none text-sm" placeholder="00.000.000/0000-00" />
                            </div>
                        </div>
                        <div class="flex items-end gap-2">
                            <div class="flex-1">
                                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">CEP</label>
                                <input type="text" id="cliente-cep" class="w-full px-4 py-2 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 outline-none text-sm" placeholder="00000-000" />
                            </div>
                            <button id="btn-buscar-cep" class="p-2.5 bg-slate-100 rounded-xl hover:bg-indigo-50 hover:text-indigo-600 transition-colors">
                                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                            </button>
                        </div>
                        <input type="text" id="cliente-endereco" class="w-full px-4 py-2 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 outline-none text-sm" placeholder="Endereço Completo" />
                        <div class="grid grid-cols-2 gap-3">
                            <input type="text" id="cliente-cidade" class="w-full px-4 py-2 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 outline-none text-sm" placeholder="Cidade" />
                            <input type="text" id="cliente-estado" class="w-full px-4 py-2 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 outline-none text-sm" placeholder="Estado" />
                        </div>
                    </div>
                </section>

                <section class="bg-slate-900 p-6 rounded-3xl text-white shadow-xl space-y-4">
                    <div class="flex items-center gap-2 border-b border-slate-800 pb-3">
                        <svg class="w-4 h-4 text-indigo-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></svg>
                        <h2 class="font-bold">Finanças</h2>
                    </div>
                    <div class="space-y-3">
                        <div class="flex justify-between text-xs text-slate-400"><span>Produtos</span><span id="valor-mercadoria">R$ 0,00</span></div>
                        <div class="flex flex-col gap-1">
                            <label class="text-[9px] font-bold text-indigo-400 uppercase">Frete (+)</label>
                            <input type="number" id="input-frete" value="0" class="bg-slate-800 border-none rounded-xl p-2 text-sm outline-none focus:ring-1 focus:ring-indigo-500" />
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="text-[9px] font-bold text-rose-400 uppercase">Desconto (-)</label>
                            <input type="number" id="input-desconto" value="0" class="bg-slate-800 border-none rounded-xl p-2 text-sm outline-none focus:ring-1 focus:ring-rose-500" />
                        </div>
                        <div class="pt-4 border-t border-slate-800 flex justify-between items-center">
                            <span class="font-bold text-sm">TOTAL</span>
                            <span id="valor-final" class="text-2xl font-black text-indigo-400">R$ 0,00</span>
                        </div>
                    </div>
                </section>
            </aside>

            <!-- Lista de Modelos -->
            <div class="lg:col-span-8 space-y-6">
                <div class="flex justify-between items-center bg-white p-6 rounded-3xl border border-slate-200">
                    <div>
                        <h2 class="text-xl font-black">Produtos do Pedido</h2>
                        <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">Controle de Produção</p>
                    </div>
                    <div class="flex gap-2">
                        <button id="btn-add-modelo" class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-3 rounded-2xl font-bold transition-all shadow-lg active:scale-95 text-sm">
                            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg> Novo Modelo
                        </button>
                        <label class="flex items-center gap-2 bg-slate-800 hover:bg-slate-900 text-white px-5 py-3 rounded-2xl font-bold transition-all cursor-pointer text-sm">
                            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg> Lote
                            <input type="file" id="input-lote" multiple className="hidden" accept="image/*" style="display:none" />
                        </label>
                    </div>
                </div>

                <div id="modelos-lista" class="space-y-4">
                    <!-- Modelos serão inseridos aqui via JS -->
                </div>
            </div>
        </main>

        <!-- Menu Flutuante -->
        <div class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-white/80 backdrop-blur-xl border border-slate-200 px-6 py-4 rounded-[2rem] shadow-2xl flex items-center gap-6 z-[100]">
            <div class="hidden md:block border-r border-slate-200 pr-6">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-none">Documentos</p>
                <p class="text-[8px] text-slate-300 font-bold mt-1">SISTEMA PRO v2.5</p>
            </div>
            <div class="flex gap-3">
                <button onclick="window.print()" class="flex items-center gap-2 bg-slate-800 text-white px-5 py-2.5 rounded-2xl text-xs font-bold hover:bg-black transition-all">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg> PDF Cliente
                </button>
                <button onclick="window.print()" class="flex items-center gap-2 bg-indigo-600 text-white px-5 py-2.5 rounded-2xl text-xs font-bold hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16.5 9.4 7.55 4.24M21 16V8a2 2 0 0 0-1-1.73L13 2.27a2 2 0 0 0-2 0L4 6.27A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><polyline points="3.29 7l8.71 5 8.71-5"/><line x1="12" y1="22" x2="12" y2="12"/></svg> PDF Produção
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-24 left-1/2 -translate-x-1/2 z-[110]"></div>

    <!-- Scripts do Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Variáveis Globais para os outros scripts
        window.FirebaseOps = { setDoc, doc, onSnapshot };

        // --- Inicialização ---
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'order-system-pro';

        let user = null;
        let isFirstLoad = true;

        // --- Estado da Aplicação ---
        window.appState = {
            cliente: { nome: '', telefone: '', cnpj: '', cep: '', endereco: '', bairro: '', cidade: '', estado: '', logo: '' },
            modelos: [],
            config: { desconto: 0, frete: 0, gradePadrao: { '34': 0, '35': 0, '36': 0, '37': 0, '38': 0, '39': 0, '40': 0 } }
        };

        // --- Autenticação ---
        const init = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };

        onAuthStateChanged(auth, (u) => {
            user = u;
            if (user) {
                // Sincronização em tempo real
                onSnapshot(doc(db, 'artifacts', appId, 'users', user.uid, 'currentOrder', 'main'), (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        window.appState.cliente = data.cliente || window.appState.cliente;
                        window.appState.modelos = data.modelos || [];
                        window.appState.config = data.config || window.appState.config;
                        
                        // Atualiza a interface apenas na primeira carga ou via disparos específicos
                        if (isFirstLoad) {
                            updateUIFromState();
                            isFirstLoad = false;
                        } else {
                            // Se a mudança veio de outro dispositivo, atualizamos a lista de modelos
                            renderModelos();
                            calculateTotals();
                        }
                    }
                });
            }
        });

        init();

        // Função Global para salvar no Firebase
        window.saveToCloud = async () => {
            if (!user) return;
            document.getElementById('sync-indicator').classList.replace('bg-green-500', 'bg-amber-400');
            document.getElementById('sync-text').innerText = 'A Guardar...';
            
            try {
                await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'currentOrder', 'main'), {
                    cliente: window.appState.cliente,
                    modelos: window.appState.modelos,
                    config: window.appState.config,
                    lastUpdated: new Date().toISOString()
                });
                
                setTimeout(() => {
                    document.getElementById('sync-indicator').classList.replace('bg-amber-400', 'bg-green-500');
                    document.getElementById('sync-text').innerText = 'Nuvem Ativa';
                }, 500);
            } catch (e) {
                console.error(e);
                showToast("Erro ao sincronizar", "error");
            }
        };
    </script>

    <!-- Lógica de Interface (Vanilla JS) -->
    <script>
        // --- Seletores ---
        const elModelosLista = document.getElementById('modelos-lista');
        const elClienteNome = document.getElementById('cliente-nome');
        const elClienteTelefone = document.getElementById('cliente-telefone');
        const elClienteCnpj = document.getElementById('cliente-cnpj');
        const elClienteCep = document.getElementById('cliente-cep');
        const elClienteEnd = document.getElementById('cliente-endereco');
        const elClienteCid = document.getElementById('cliente-cidade');
        const elClienteEst = document.getElementById('cliente-estado');
        const elLogoImg = document.getElementById('logo-img');
        const elLogoPlaceholder = document.getElementById('logo-placeholder');
        const elInputFrete = document.getElementById('input-frete');
        const elInputDesconto = document.getElementById('input-desconto');

        // --- Funções de Ajuda ---
        function showToast(msg, type = "success") {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 toast-animate mb-4 ${type === 'success' ? 'bg-indigo-600' : 'bg-rose-600'} text-white`;
            toast.innerHTML = `<svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg><span class="font-bold text-sm tracking-tight">${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function updateUIFromState() {
            const { cliente, config } = window.appState;
            elClienteNome.value = cliente.nome || '';
            elClienteTelefone.value = cliente.telefone || '';
            elClienteCnpj.value = cliente.cnpj || '';
            elClienteCep.value = cliente.cep || '';
            elClienteEnd.value = cliente.endereco || '';
            elClienteCid.value = cliente.cidade || '';
            elClienteEst.value = cliente.estado || '';
            
            if (cliente.logo) {
                elLogoImg.src = cliente.logo;
                elLogoImg.classList.remove('hidden');
                elLogoPlaceholder.classList.add('hidden');
            }

            elInputFrete.value = config.frete || 0;
            elInputDesconto.value = config.desconto || 0;

            renderModelos();
            calculateTotals();
        }

        function calculateTotals() {
            const { modelos, config } = window.appState;
            let totalParesGlobal = 0;
            let subtotalProdutos = 0;

            modelos.forEach(m => {
                const paresCor = Object.values(m.grade).reduce((a, b) => a + (parseInt(b) || 0), 0);
                const nCores = m.cores.split(',').filter(c => c.trim()).length || 1;
                const totalModelo = paresCor * nCores;
                
                totalParesGlobal += totalModelo;
                subtotalProdutos += totalModelo * (parseFloat(m.valorUnitario) || 0);
            });

            const frete = parseFloat(elInputFrete.value) || 0;
            const desconto = parseFloat(elInputDesconto.value) || 0;
            const final = subtotalProdutos + frete - desconto;

            document.getElementById('total-pares-header').innerText = totalParesGlobal;
            document.getElementById('subtotal-header').innerText = `R$ ${final.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
            document.getElementById('valor-mercadoria').innerText = `R$ ${subtotalProdutos.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
            document.getElementById('valor-final').innerText = `R$ ${final.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
        }

        function renderModelos() {
            const { modelos } = window.appState;
            elModelosLista.innerHTML = '';

            if (modelos.length === 0) {
                elModelosLista.innerHTML = `
                    <div class="bg-slate-100/50 border-2 border-dashed border-slate-200 rounded-[2.5rem] py-20 flex flex-col items-center gap-3">
                        <svg class="w-12 h-12 text-slate-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73L13 2.27a2 2 0 0 0-2 0L4 6.27A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/></svg>
                        <p class="text-slate-400 font-bold uppercase text-[10px] tracking-[0.2em]">Sem modelos no pedido</p>
                    </div>
                `;
                return;
            }

            modelos.forEach((m, idx) => {
                const paresCor = Object.values(m.grade).reduce((a, b) => a + (parseInt(b) || 0), 0);
                const nCores = m.cores.split(',').filter(c => c.trim()).length || 1;
                const totalModelo = paresCor * nCores;
                const subModelo = totalModelo * (parseFloat(m.valorUnitario) || 0);

                const card = document.createElement('div');
                card.className = "bg-white rounded-[2rem] border border-slate-200 overflow-hidden shadow-sm group";
                card.innerHTML = `
                    <div class="flex flex-col md:flex-row">
                        <div class="w-full md:w-48 h-48 relative bg-slate-100">
                            <img src="${m.foto}" class="w-full h-full object-cover" />
                            <div class="absolute top-3 left-3 bg-black/50 backdrop-blur-md text-white text-[9px] font-black px-2 py-1 rounded-lg uppercase">Item #${idx+1}</div>
                            <input type="file" class="absolute inset-0 opacity-0 cursor-pointer" onchange="updateModeloFoto('${m.id}', this)" />
                        </div>
                        <div class="flex-1 p-6 space-y-4">
                            <div class="flex justify-between items-start gap-4">
                                <div class="flex-1">
                                    <label class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Cores</label>
                                    <input type="text" value="${m.cores}" oninput="updateModeloData('${m.id}', 'cores', this.value)" class="w-full border-b border-slate-100 py-1 outline-none focus:border-indigo-500 font-bold text-sm" placeholder="Ex: Preto, Nude" />
                                </div>
                                <div class="text-right">
                                    <label class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Valor Unit.</label>
                                    <div class="flex items-center gap-1 font-black text-lg">
                                        <span class="text-slate-300 text-sm">R$</span>
                                        <input type="number" value="${m.valorUnitario}" oninput="updateModeloData('${m.id}', 'valorUnitario', this.value)" class="w-20 text-right outline-none bg-transparent" />
                                    </div>
                                </div>
                            </div>
                            <div class="grid grid-cols-7 gap-2">
                                ${Object.keys(m.grade).map(size => `
                                    <div class="flex flex-col items-center">
                                        <span class="text-[10px] font-bold text-slate-400 mb-1">${size}</span>
                                        <input type="number" value="${m.grade[size]}" oninput="updateModeloGrade('${m.id}', '${size}', this.value)" class="w-full text-center py-2 bg-slate-50 rounded-xl border-none outline-none focus:ring-2 focus:ring-indigo-500/20 font-bold text-sm" />
                                    </div>
                                `).join('')}
                            </div>
                            <div class="flex justify-between items-center pt-4 border-t border-slate-50">
                                <div class="flex gap-4">
                                    <div class="bg-indigo-50 px-3 py-1 rounded-full text-[10px] font-bold text-indigo-600 uppercase tracking-widest">${totalModelo} pares</div>
                                    <div class="bg-emerald-50 px-3 py-1 rounded-full text-[10px] font-bold text-emerald-600 uppercase tracking-widest">R$ ${subModelo.toLocaleString('pt-BR')}</div>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="cloneModelo('${m.id}')" class="p-2 hover:bg-slate-50 text-slate-300 hover:text-indigo-600 transition-all">
                                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                                    </button>
                                    <button onclick="deleteModelo('${m.id}')" class="p-2 hover:bg-rose-50 text-slate-300 hover:text-rose-600 transition-all">
                                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6"/></svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                elModelosLista.appendChild(card);
            });
        }

        // --- Eventos de Input (Debounce no save) ---
        let saveTimeout;
        const triggerSave = () => {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => window.saveToCloud(), 1000);
        };

        const updateCliente = (field, val) => {
            window.appState.cliente[field] = val;
            calculateTotals();
            triggerSave();
        };

        elClienteNome.oninput = (e) => updateCliente('nome', e.target.value);
        elClienteTelefone.oninput = (e) => updateCliente('telefone', e.target.value);
        elClienteCnpj.oninput = (e) => updateCliente('cnpj', e.target.value);
        elClienteCep.oninput = (e) => updateCliente('cep', e.target.value);
        elClienteEnd.oninput = (e) => updateCliente('endereco', e.target.value);
        elClienteCid.oninput = (e) => updateCliente('cidade', e.target.value);
        elClienteEst.oninput = (e) => updateCliente('estado', e.target.value);
        
        elInputFrete.oninput = (e) => { window.appState.config.frete = e.target.value; calculateTotals(); triggerSave(); };
        elInputDesconto.oninput = (e) => { window.appState.config.desconto = e.target.value; calculateTotals(); triggerSave(); };

        // --- Funções dos Modelos ---
        window.updateModeloData = (id, field, val) => {
            const index = window.appState.modelos.findIndex(m => m.id === id);
            if (index > -1) {
                window.appState.modelos[index][field] = val;
                calculateTotals();
                triggerSave();
            }
        };

        window.updateModeloGrade = (id, size, val) => {
            const index = window.appState.modelos.findIndex(m => m.id === id);
            if (index > -1) {
                window.appState.modelos[index].grade[size] = parseInt(val) || 0;
                calculateTotals();
                // Aqui não renderizamos tudo para não perder o foco do input, mas atualizamos os cálculos
                const cardTotals = elModelosLista.children[index].querySelector('.bg-indigo-50').parentNode;
                const pCor = Object.values(window.appState.modelos[index].grade).reduce((a, b) => a + (parseInt(b) || 0), 0);
                const nC = window.appState.modelos[index].cores.split(',').filter(c => c.trim()).length || 1;
                cardTotals.children[0].innerText = `${pCor * nC} pares`;
                cardTotals.children[1].innerText = `R$ ${(pCor * nC * window.appState.modelos[index].valorUnitario).toLocaleString('pt-BR')}`;
                triggerSave();
            }
        };

        window.updateModeloFoto = (id, input) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const index = window.appState.modelos.findIndex(m => m.id === id);
                if (index > -1) {
                    window.appState.modelos[index].foto = e.target.result;
                    renderModelos();
                    triggerSave();
                }
            };
            if(input.files[0]) reader.readAsDataURL(input.files[0]);
        };

        window.deleteModelo = (id) => {
            window.appState.modelos = window.appState.modelos.filter(m => m.id !== id);
            renderModelos();
            calculateTotals();
            triggerSave();
        };

        window.cloneModelo = (id) => {
            const target = window.appState.modelos.find(m => m.id === id);
            if (target) {
                const clone = JSON.parse(JSON.stringify(target));
                clone.id = Math.random().toString(36).substr(2, 9);
                window.appState.modelos.push(clone);
                renderModelos();
                calculateTotals();
                triggerSave();
            }
        };

        document.getElementById('btn-add-modelo').onclick = () => {
            const newModel = { 
                id: Math.random().toString(36).substr(2, 9), 
                foto: 'https://placehold.co/300x300/e2e8f0/6366f1?text=Novo+Modelo', 
                cores: '', 
                valorUnitario: 0, 
                grade: { ...window.appState.config.gradePadrao } 
            };
            window.appState.modelos.push(newModel);
            renderModelos();
            calculateTotals();
            triggerSave();
            showToast("Modelo adicionado!");
        };

        // --- CEP e Logo ---
        document.getElementById('btn-buscar-cep').onclick = async () => {
            const cep = elClienteCep.value.replace(/\D/g, '');
            if (cep.length !== 8) return;
            try {
                const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                const data = await res.json();
                if (!data.erro) {
                    elClienteEnd.value = data.logradouro;
                    elClienteCid.value = data.localidade;
                    elClienteEst.value = data.uf;
                    updateCliente('endereco', data.logradouro);
                    updateCliente('cidade', data.localidade);
                    updateCliente('estado', data.uf);
                }
            } catch (e) { showToast("Erro no CEP", "error"); }
        };

        document.getElementById('input-logo').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                elLogoImg.src = ev.target.result;
                elLogoImg.classList.remove('hidden');
                elLogoPlaceholder.classList.add('hidden');
                updateCliente('logo', ev.target.result);
            };
            if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
        };

        document.getElementById('input-lote').onchange = (e) => {
            const files = Array.from(e.target.files);
            files.forEach(f => {
                const r = new FileReader();
                r.onload = ev => {
                    const newModel = { 
                        id: Math.random().toString(36).substr(2, 9), 
                        foto: ev.target.result, 
                        cores: '', 
                        valorUnitario: 0, 
                        grade: { ...window.appState.config.gradePadrao } 
                    };
                    window.appState.modelos.push(newModel);
                    if (files.indexOf(f) === files.length - 1) {
                        renderModelos();
                        calculateTotals();
                        triggerSave();
                        showToast("Lote importado!");
                    }
                };
                r.readAsDataURL(f);
            });
        };
    </script>
</body>
</html>
